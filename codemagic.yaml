workflows:
  ios_ipa_sideloadly:
    name: iOS IPA para Sideloadly
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Instalar dependencias
        script: |
          npm install

      - name: Crear carpeta iOS si no existe
        script: |
          npx cap add ios || true

      - name: Sincronizar proyecto con iOS
        script: |
          npx cap sync ios

      - name: Agregar permisos de ubicacion iOS
        script: |
          INFO_PLIST="ios/App/App/Info.plist"

          if [ ! -f "$INFO_PLIST" ]; then
            echo "No se encontro Info.plist en $INFO_PLIST"
            find ios -name "Info.plist" -print || true
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription La app necesita acceder a tu
